name: Cleanup Discovery Logs

on:
  schedule:
    - cron: '35 2 * * *'
  workflow_dispatch:

permissions:
  actions: write
  contents: read

jobs:
  cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Delete discovery runs older than 30 days
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner
            const repo = context.repo.repo
            const workflowIds = [
              'discover-unofficial.yml',
              'cleanup-discovery-logs.yml',
            ]
            const cutoff = Date.now() - 30 * 24 * 60 * 60 * 1000
            let totalDeleted = 0

            for (const workflowId of workflowIds) {
              const staleRunIds = []
              let page = 1
              let deleted = 0

              while (true) {
                const { data } = await github.rest.actions.listWorkflowRuns({
                  owner,
                  repo,
                  workflow_id: workflowId,
                  per_page: 100,
                  page,
                })
                const runs = data.workflow_runs ?? []

                if (runs.length === 0) {
                  break
                }

                for (const run of runs) {
                  if (new Date(run.created_at).getTime() < cutoff) {
                    staleRunIds.push(run.id)
                  }
                }

                page += 1
              }

              for (const runId of staleRunIds) {
                try {
                  await github.rest.actions.deleteWorkflowRun({
                    owner,
                    repo,
                    run_id: runId,
                  })
                  deleted += 1
                } catch (error) {
                  core.warning(`Could not delete ${workflowId} run ${runId}: ${error.message}`)
                }
              }

              totalDeleted += deleted
              core.info(`Deleted ${deleted} ${workflowId} workflow runs older than 30 days.`)
            }

            core.info(`Deleted ${totalDeleted} old workflow runs in total.`)
