name: Discover Unofficial Papers

on:
  schedule:
    - cron: '15 1 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: unofficial-discovery
  cancel-in-progress: false

jobs:
  discover:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check Zhipu secret
        env:
          ZHIPU_API_KEY: ${{ secrets.ZHIPU_API_KEY }}
        run: |
          if [ -z "$ZHIPU_API_KEY" ]; then
            echo "ZHIPU_API_KEY is not configured."
            exit 1
          fi

      - name: Refresh unofficial discoveries and rebuild assets
        env:
          ZHIPU_API_KEY: ${{ secrets.ZHIPU_API_KEY }}
          ZHIPU_MODEL: glm-4.5-flash
        run: npm run pipeline:refresh:discover

      - name: Commit updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data public
          if git diff --cached --quiet; then
            echo "No unofficial paper changes."
            exit 0
          fi
          git commit -m "chore: refresh unofficial paper discoveries"
          git push
